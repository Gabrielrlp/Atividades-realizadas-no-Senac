<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>E-comerce</title>
</head>
<body>
    <header>
        <img src="assets/logo.svg" class="logo" alt="">

        <a href="#">Collections</a>
        <a href="#">Men</a>
        <a href="#">Woman</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
        
        <img class="cart" src="assets/icon-cart.svg" alt="Icone do carrinho">
        <img class="avatar" src="assets/image-avatar.png" alt="Icone do usuário">
  
    </header>

        <div class="produto-container">

            <div class="image-area">
                <img src="assets/image-product-1-thumbnail.jpg" class="imagem-principal" alt="Foto 1 do produto">
                
                <div class="miniaturas">
                    
                    <img src="assets/image-product-1.jpg" alt="Foto 1 do produto em escala menor">
                    <img src="assets/image-product-2-thumbnail.jpg"  alt="Foto 2 do produto">
                    <img src="assets/image-product-3-thumbnail.jpg"  alt="Foto 3 do produto">
                    <img src="assets/image-product-4-thumbnail.jpg"  alt="Foto 4 do produto">
                    
                </div>
            </div>
            
            <div class="texto">
                
                <h3 class="marca">SNEAKER COMPANY</h3>
                <h1 class="titulo">Fall Limited Edition Sneakers</h1>
                <p class="descricao">These low-profile sneakers are your perfect casual wear companion. Featurin a durable rubber outer sole. they'll withstand everythin the weather can offer.</p>
                <h2 class="valor-desconto">$125.00</h2>
                <h3 class="valor-original">$250.00</h3>
                
                <div class="buy-container">
                    
                    <div class="botao-quantidade">
                        
                        <img src="assets/icon-minus.svg" alt="icone.menos">
                        <h3>0</h3>
                        <img src="assets/icon-plus.svg"  alt="icone.mais">
                    </div>
                    
                    <div class="botao-carrinho">
                        
                        <img src="assets/icon-cart.svg" alt="icone.carrinho">
                        <h2>Add to cart</h2>
                    </div>
                    
                </div>
                
            </div>
            
        </div>

    <div>
        <script src="script.js"></script>
    </div>

    </body>
</html>
